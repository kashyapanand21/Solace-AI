<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Files AI | Obsidian Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { 
            background-color: #130802; /* Exact background from reference */
            font-family: 'Poppins', sans-serif;
            color: #e5e7eb;
            margin: 0;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
        }
        .orange-glow {
            text-shadow: 0 0 15px rgba(255, 69, 0, 0.5);
        }
        /* The Atom Loader from the source */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #130802; z-index: 9999; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
